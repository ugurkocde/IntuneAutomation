name: Publish MCP Server to npm

# Publishes the intuneautomation-mcp package when a release tagged mcp-v* is
# created (e.g. mcp-v1.0.0), or manually via workflow_dispatch.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run npm publish in --dry-run mode"
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  publish:
    # On release, only run for tags starting with mcp-v
    if: github.event_name == 'workflow_dispatch' || startsWith(github.event.release.tag_name, 'mcp-v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm provenance
    defaults:
      run:
        working-directory: mcp
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify (end-to-end against GitHub)
        run: npm run verify

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          # access + provenance also come from package.json publishConfig.
          if [ "$DRY_RUN" = "true" ]; then
            npm publish --provenance --access public --dry-run
          else
            npm publish --provenance --access public
          fi
