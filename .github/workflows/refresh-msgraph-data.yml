# Pulls the latest Microsoft Graph permission scopes + curated samples from
# merill/msgraph and commits the regenerated data module if anything changed.
# This workflow does not consume any user-controlled input — only the
# committed sync script + the public merill/msgraph data feed.

name: Refresh msgraph data

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Regenerate Graph data module
        working-directory: web
        run: node scripts/sync-msgraph-data.mjs

      - name: Detect changes
        id: diff
        run: |
          if [[ -n "$(git status --porcelain web/src/lib/generator-graph-data.ts)" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/src/lib/generator-graph-data.ts
          git commit -m "chore(web): refresh msgraph data from graph.pm"
          git push
